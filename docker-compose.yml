version: "3.8"

services:
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    ports:
      - "8088:80"
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      certbot certonly --standalone
      --email isaiasml555@gmail.com
      --agree-tos
      --no-eff-email
      --keep-until-expiring
      -d netdes.xyz
      -d www.netdes.xyz

  nginx:
    image: nginx:alpine
    container_name: nginx-https
    restart: unless-stopped
    ports:
      - "6532:6532"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - certbot-certs:/etc/letsencrypt:ro
    networks:
      - nginx-net
    depends_on:
      - certbot

volumes:
  certbot-certs:
  certbot-www:

networks:
  nginx-net:
    driver: bridge
